services:
  redis:
    image: docker-registry-002.zeuslearning.com/zeuslearning/redis
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network

  mysql:
    image: docker-registry-002.zeuslearning.com/zeuslearning/mysql
    container_name: mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pRoot@123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  rabbitmq:
    image: docker-registry-002.zeuslearning.com/zeuslearning/rabbitmq:3.13.7-management
    container_name: rabbitmq
    hostname: rabbitmq-server
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  traineemanagement-api:
    build:
      context: .
      dockerfile: TraineeManagement.Api/Dockerfile
      args:
        DOMAIN_OWNER: ${DOMAIN_OWNER}
        NUGET_REPO_NAME: ${NUGET_REPO_NAME}
        CODEARTIFACT_AUTH_TOKEN: ${CODEARTIFACT_AUTH_TOKEN}
        REGION: ${REGION}
    container_name : traineemanagementapi-container
    image: traineemanagement-api:latest
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    env_file:
      - .env
    depends_on:
      - mysql
      - redis
      - rabbitmq
    networks:
      - app-network
    volumes:
      - shared-uploads:/App/uploads
      - ./TraineeManagement.Api/appsettings.json:/App/appsettings.json

  trainingdirectory-api:
    build:
      context: .
      dockerfile: TrainingDirectory.Api/Dockerfile
      args:
        DOMAIN_OWNER: ${DOMAIN_OWNER}
        NUGET_REPO_NAME: ${NUGET_REPO_NAME}
        CODEARTIFACT_AUTH_TOKEN: ${CODEARTIFACT_AUTH_TOKEN}
        REGION: ${REGION}
    container_name : trainingdirectoryapi-container
    image: traineedirectory-api:latest
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    env_file:
      - .env
    networks:
      - app-network

  traineemanagement-worker:
    build:
      context: .
      dockerfile: TraineeManagement.Worker/Dockerfile
      args:
        DOMAIN_OWNER: ${DOMAIN_OWNER}
        NUGET_REPO_NAME: ${NUGET_REPO_NAME}
        CODEARTIFACT_AUTH_TOKEN: ${CODEARTIFACT_AUTH_TOKEN}
        REGION: ${REGION}
    container_name : traineemanagementworker-container
    image: traineemanagement-worker:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - shared-uploads:/App/uploads
      - ./TraineeManagement.Worker/appsettings.json:/App/appsettings.json

networks:
  app-network:
    driver: bridge

volumes:
  redis-data:
  mysql-data:
  rabbitmq_data:
  shared-uploads: