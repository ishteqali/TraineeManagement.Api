services:
  redis:
    image: docker-registry-002.zeuslearning.com/zeuslearning/redis
    container_name: trainee_redis
    restart: unless-stopped

    ports:
      - "6379:6379"


  rabbitmq:
    image: docker-registry-002.zeuslearning.com/zeuslearning/rabbitmq:3-management
    container_name: trainee_rabbitmq
    restart: unless-stopped

    ports:
      - "5672:5672"
      - "15672:15672"

    environment:
      RABBITMQ_DEFAULT_USER: ${RabbitMQ__Username}
      RABBITMQ_DEFAULT_PASS: ${RabbitMQ__Password}
